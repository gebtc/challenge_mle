# =============================================================================
# Continuous Delivery — Fly.io
#
# Triggered on every push to the `main` branch.
#
# Workflow:
#   1. Deploy to Fly.io using the Fly.io GitHub Action.
#   2. Run a smoke test against the /health endpoint.
#   3. Optionally run a stress (load) test.
#
# Prerequisites (to be configured once in the repository):
#   - FLY_API_TOKEN      — Fly.io API token (generate via `flyctl auth token`)
#   - FLY_APP_NAME       — Fly.io app name (default: challenge-mle-api)
#
# References:
#   - https://github.com/superfly/flyctl-actions
# =============================================================================

name: "Continuous Delivery"

on:
  push:
    branches:
      - main

env:
  FLY_APP_NAME: ${{ vars.FLY_APP_NAME || 'challenge-mle-api' }}

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # ----------------------------------------------------------------------
      # Step 1 — Checkout
      # ----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------------------
      # Step 2 — Install Fly.io CLI
      # ----------------------------------------------------------------------
      - name: Install Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      # ----------------------------------------------------------------------
      # Step 3 — Deploy to Fly.io
      #
      # The FLY_API_TOKEN secret must be configured in GitHub repository
      # secrets. Generate one locally with: flyctl auth token
      # ----------------------------------------------------------------------
      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # ----------------------------------------------------------------------
      # Step 4 — Smoke test (health check)
      #
      # Waits for the new deployment to be ready and curls the /health
      # endpoint. Failures here trigger a rollback alert.
      # ----------------------------------------------------------------------
      - name: Smoke test — /health endpoint
        run: |
          URL="https://${{ env.FLY_APP_NAME }}.fly.dev"
          echo "Smoke testing $URL/health"
          for i in $(seq 1 12); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "$URL/health" 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Health check passed (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_STATUS — retrying in 10s..."
            sleep 10
          done
          echo "❌ Health check failed after 12 attempts"
          exit 1

      # ----------------------------------------------------------------------
      # Step 5 — Optional: Run a quick stress test with locust
      #
      # This step is best-effort; it will not block the deployment.
      # Comment it out if you do not want load testing during CD.
      # ----------------------------------------------------------------------
      - name: Optional — Run stress test
        continue-on-error: true
        run: |
          URL="https://${{ env.FLY_APP_NAME }}.fly.dev"
          pip install locust~=1.6
          locust -f tests/stress/api_stress.py \
            --print-stats \
            --run-time 30s \
            --headless \
            --users 50 \
            --spawn-rate 5 \
            -H "$URL" || echo "⚠️ Stress test completed with warnings — see logs for details."
