# fly.toml — Flight Delay Prediction API
# Deploy: fly deploy
# Docs: https://fly.io/docs/reference/configuration/

app = "flight-delay-api"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  max_machines_running = 1

  [[http_service.checks]]
    path = "/health"
    interval = "30s"
    timeout = "5s"
    method = "GET"

[env]
  PYTHONUNBUFFERED = "1"
